<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guitar Fretboard Trainer</title>
    
    <!-- Preconnect for fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Tailwind CSS via CDN (Bonus if it loads) -->
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        /* --- CRITICAL FALLBACK STYLES (Works without internet) --- */
        :root {
            --bg-light: #ffffff;
            --bg-panel: #f7f7f7;
            --text-dark: #1f1f1f;
            --text-light: #6b7280;
            --accent-color: #3b82f6;
            --accent-color-translucent: rgba(59, 130, 246, 0.3);
            --border-color: #e5e7eb;
            --success-color: #16a34a;
            --error-color: #dc2626;
        }

        body.dark {
            --bg-light: #111827;
            --bg-panel: #1f2937;
            --text-dark: #f9fafb;
            --text-light: #9ca3af;
            --accent-color: #60a5fa;
            --accent-color-translucent: rgba(96, 165, 250, 0.3);
            --border-color: #374151;
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-light);
            color: var(--text-dark);
            line-height: 1.5;
        }

        /* Layout Utilities */
        .hidden { display: none !important; }
        .flex { display: flex; }
        .flex-col { flex-direction: column; }
        .items-center { align-items: center; }
        .justify-center { justify-content: center; }
        .justify-between { justify-content: space-between; }
        .text-center { text-align: center; }
        .w-full { width: 100%; }
        .h-screen { height: 100vh; }
        .min-h-screen { min-height: 100vh; }
        .relative { position: relative; }
        
        /* Spacing & Sizing Fallbacks */
        .p-2 { padding: 0.5rem; }
        .p-4 { padding: 1rem; }
        .mt-4 { margin-top: 1rem; }
        .mb-8 { margin-bottom: 2rem; }
        .gap-2 { gap: 0.5rem; }
        .gap-4 { gap: 1rem; }
        
        /* Grid System Fallback */
        .grid { display: grid; }
        .grid-cols-2 { grid-template-columns: repeat(2, 1fr); }
        .grid-cols-4 { grid-template-columns: repeat(4, 1fr); }

        /* Component Styles */
        .btn-primary {
            background-color: var(--accent-color);
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            border: none;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .btn-secondary {
            background-color: #4b5563;
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            border: none;
            font-weight: bold;
            cursor: pointer;
        }
        
        /* --- Side Panel --- */
        #side-panel {
            width: 300px;
            background-color: var(--bg-panel);
            border-right: 1px solid var(--border-color);
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            transform: translateX(-100%);
            transition: transform 0.3s ease;
            z-index: 1000;
            padding: 1.5rem;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }
        
        body.panel-visible #side-panel { transform: translateX(0); }
        
        #settings-toggle-btn {
            position: fixed;
            top: 1rem;
            left: 1rem;
            z-index: 1001;
            background: rgba(255,255,255,0.9);
            border: 1px solid var(--border-color);
            padding: 0.5rem 1rem;
            border-radius: 0.375rem;
            cursor: pointer;
            font-weight: 600;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        body.dark #settings-toggle-btn { background: rgba(31,41,55,0.9); color: white; }

        /* --- Fretboard --- */
        #fretboard-container {
            width: 100%;
            overflow-x: auto;
            margin-top: 1rem;
            padding-bottom: 2rem;
            position: relative;
        }
        #fretboard {
            display: grid;
            background: var(--bg-light);
            border: 2px solid var(--text-dark);
            position: relative;
            min-width: 600px; /* Ensure scroll on small screens */
        }
        .fret {
            border-right: 2px solid #a0a0a0;
            height: 45px; /* Consistent height */
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .fret[data-fret='0'] { border-right-width: 6px; border-right-color: var(--text-dark); }
        
        .string-line { 
            background-color: #525252; 
            width: 100%; 
            position: absolute; 
            top: 50%; 
            transform: translateY(-50%);
            z-index: 0;
        }
        
        .marker-dot {
            background-color: #d4d4d4;
            width: 18px; height: 18px;
            border-radius: 50%;
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1;
        }
        
        /* --- Improved Note Highlight (Centered in Parent) --- */
        #highlight-dot, .spider-dot {
            position: absolute;
            width: 30px; 
            height: 30px;
            border: 4px solid var(--accent-color);
            border-radius: 50%;
            pointer-events: none;
            z-index: 10;
            box-shadow: 0 0 8px var(--accent-color);
            /* Perfect centering relative to .fret parent */
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: none; /* Hidden by default */
        }

        /* --- Tabs & Buttons --- */
        .switcher-container {
            display: flex;
            background: #f3f4f6;
            padding: 4px;
            border-radius: 8px;
            margin: 1rem auto;
            max-width: 400px;
            border: 1px solid var(--border-color);
        }
        body.dark .switcher-container { background: #374151; }
        
        .switcher-btn {
            flex: 1;
            padding: 8px;
            border: none;
            background: transparent;
            cursor: pointer;
            border-radius: 6px;
            color: var(--text-light);
            font-weight: 500;
            font-size: 0.9rem;
        }
        .switcher-btn.active {
            background: var(--accent-color);
            color: white;
            font-weight: bold;
        }

        /* --- Stats --- */
        #stats-display {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 1.5rem;
            background: var(--bg-panel);
            padding: 0.5rem;
            border-radius: 0.5rem;
            margin: 1rem auto;
            max-width: 300px;
            border: 1px solid var(--border-color);
        }
        .stat-separator { width: 1px; height: 24px; background: var(--border-color); }

        /* --- Answer Buttons --- */
        #answer-options button {
            width: 100%;
            padding: 1rem;
            border: 1px solid var(--border-color);
            background: var(--bg-light);
            color: var(--text-dark);
            border-radius: 0.5rem;
            font-size: 1.1rem;
            cursor: pointer;
            transition: background 0.2s;
        }
        #answer-options button:hover { background: var(--bg-panel); }
        #answer-options button.correct-ans { background: #dcfce7; border-color: #22c55e; color: #15803d; }
        #answer-options button.wrong-ans { background: #fee2e2; border-color: #ef4444; color: #b91c1c; }

        /* --- Tablature --- */
        .tab-string {
            display: flex;
            align-items: center;
            height: 2.5rem;
            border-bottom: 1px solid #a0a0a0;
            font-family: monospace;
            font-size: 1.2rem;
        }
        .tab-fret { font-weight: bold; color: var(--accent-color); }
        
        /* --- Metronome Dots --- */
        .beat-dot {
            width: 14px; height: 14px;
            background: #d1d5db;
            border-radius: 50%;
            transition: all 0.1s;
        }
        .beat-dot.active { background: var(--accent-color); transform: scale(1.3); }
        
        /* --- Tuner --- */
        #tuner-display {
            display: inline-flex;
            align-items: center;
            padding: 0.5rem 1rem;
            border: 2px solid var(--border-color);
            border-radius: 0.5rem;
            margin-top: 1rem;
        }
        #tuner-display.correct { background: #dcfce7; border-color: #22c55e; color: #15803d; }

        /* --- Modal --- */
        #stats-modal-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.5);
            display: flex; justify-content: center; align-items: center;
            z-index: 2000;
        }
        #stats-modal {
            background: var(--bg-light);
            width: 90%; max-width: 400px;
            border-radius: 0.5rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body class="panel-hidden">

    <button id="settings-toggle-btn">Settings</button>
    
    <!-- Side Panel -->
    <div id="side-panel">
        <h2 style="border-bottom: 1px solid var(--border-color); padding-bottom: 10px; margin-bottom: 20px;">Settings</h2>
        
        <div class="setting-group">
            <h3>Metronome</h3>
            <div style="margin-bottom: 1rem;">
                <div class="flex justify-between">
                    <label>Tempo</label>
                    <span id="bpm-display" style="font-weight: bold;">60 BPM</span>
                </div>
                <input type="range" id="bpm-slider" min="30" max="280" value="60" class="w-full">
            </div>
            <div style="margin-bottom: 1rem;">
                <label style="display:block; margin-bottom: 5px;">Note Duration (beats)</label>
                <input type="number" id="note-duration" value="1" min="1" class="w-full p-2 border rounded">
            </div>
            <div>
                <div class="flex items-center gap-2">
                    <input type="checkbox" id="speed-up-toggle">
                    <label>Accelerate Automatically</label>
                </div>
                <div id="speed-up-controls" class="grid grid-cols-2 gap-2 mt-4 hidden">
                    <div>
                        <label style="font-size: 0.8rem;">By BPM</label>
                        <input type="number" id="speed-up-amount" value="5" class="w-full p-1 border rounded">
                    </div>
                    <div>
                        <label style="font-size: 0.8rem;">Every X beats</label>
                        <input type="number" id="speed-up-interval" value="8" class="w-full p-1 border rounded">
                    </div>
                </div>
            </div>
        </div>

        <div id="practice-settings-container" class="setting-group hidden">
             <h3>Practice Settings</h3>
             <div style="margin-bottom: 1rem;">
                <label style="display:block; margin-bottom: 5px;">Note Sequence</label>
                <select id="interval-select" class="w-full p-2 border rounded">
                     <optgroup label="Intervals">
                        <option value="random">Random</option>
                        <option value="minorThirds">Minor Thirds</option>
                        <option value="majorThirds">Major Thirds</option>
                        <option value="fourths">Fourths</option>
                        <option value="fifths">Fifths</option>
                        <option value="sevenths">Sevenths</option>
                    </optgroup>
                    <optgroup label="Scales">
                        <option value="majorScale">Major Scale</option>
                        <option value="minorScale">Natural Minor Scale</option>
                        <option value="majorPentatonic">Major Pentatonic</option>
                        <option value="minorPentatonic">Minor Pentatonic</option>
                    </optgroup>
                </select>
            </div>
             <div id="scale-root-container" class="hidden" style="margin-bottom: 1rem;">
                <label>Root Note</label>
                <select id="scale-root-select" class="w-full p-2 border rounded"></select>
            </div>
             <div class="flex items-center gap-2">
                <input type="checkbox" id="mic-enable-toggle">
                <label>Enable Microphone Input</label>
            </div>
        </div>

        <div id="technique-settings-container" class="setting-group hidden">
             <h3>Technique Settings</h3>
             <div>
                <label>Start Fret</label>
                <input type="number" id="spider-start-fret" value="1" min="1" max="9" class="w-full p-2 border rounded">
            </div>
        </div>

        <div class="setting-group" style="margin-top: 20px;">
            <h3>Note Settings</h3>
            <div class="flex items-center gap-2" style="margin-bottom: 10px;">
                <input type="checkbox" id="naturals-only-toggle">
                <label>Naturals Only</label>
            </div>
            <div>
                <span style="display:block; margin-bottom: 5px;">Choose notes:</span>
                <div id="note-selection-grid" class="grid grid-cols-4 gap-2"></div>
            </div>
        </div>
        
        <div class="setting-group" style="margin-top: 20px;">
            <h3>Appearance</h3>
            <div class="flex items-center gap-2">
                <input type="checkbox" id="dark-mode-toggle">
                <label>Dark Mode</label>
            </div>
            <div class="flex items-center gap-2">
                <input type="checkbox" id="lefty-toggle">
                <label>Left-Handed Mode</label>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <main id="main-content" class="min-h-screen flex flex-col items-center justify-center p-4">
        <div class="w-full" style="max-width: 1100px; padding-top: 50px;">
            <header class="mb-8 text-center">
                <h1 class="text-3xl font-bold" style="margin-bottom: 0.5rem;">Interactive Fretboard Trainer</h1>
                <p class="text-light">Master the guitar neck with interactive drills</p>
                
                <!-- Module Switcher -->
                <div class="switcher-container">
                    <button data-module="guessNote" class="switcher-btn module-switch-btn active">Guess Note</button>
                    <button data-module="playPractice" class="switcher-btn module-switch-btn">Play Practice</button>
                    <button data-module="technique" class="switcher-btn module-switch-btn">Technique</button>
                </div>

                <div id="stats-display">
                    <div style="color: var(--success-color); font-weight: bold;">Correct: <span id="correct-count">0</span></div>
                    <div class="stat-separator"></div>
                    <div style="color: var(--error-color); font-weight: bold;">Incorrect: <span id="incorrect-count">0</span></div>
                </div>
            </header>

            <!-- Views -->
            <div id="view-switcher-container" class="text-center">
                <div class="switcher-container">
                    <button data-view="fretboard" class="switcher-btn view-switch-btn active">Fretboard → Note</button>
                    <button data-view="tab" class="switcher-btn view-switch-btn">Tab → Note</button>
                    <button data-view="noteToTab" class="switcher-btn view-switch-btn">Note → Tab</button>
                </div>
            </div>
            
            <div id="practice-mode-container" class="hidden text-center">
                 <div class="switcher-container" style="max-width: 300px;">
                    <button data-practice-mode="noteNames" class="practice-mode-btn switcher-btn active">Note Names</button>
                    <button data-practice-mode="tabSequence" class="practice-mode-btn switcher-btn">Tab Sequence</button>
                </div>
            </div>

            <div id="technique-mode-container" class="hidden text-center">
                 <div class="switcher-container" style="max-width: 200px;">
                    <button data-technique="spiderWalk" class="technique-mode-btn switcher-btn active">Spider Walk</button>
                </div>
            </div>
            
            <!-- Fretboard Display -->
            <div id="fretboard-container" class="relative">
                <div id="fretboard"></div>
                <div id="fret-numbers" style="display: grid; margin-top: 5px;"></div>
            </div>

            <!-- Tab Display -->
            <div id="tab-container" class="hidden w-full" style="max-width: 600px; margin: 20px auto;"></div>

            <!-- Questions/Display Areas -->
            <div id="note-to-tab-question-container" class="hidden practice-note-container flex flex-col items-center justify-center" style="min-height: 200px;">
                 <span class="current-practice-note" style="font-size: 6rem; font-weight: bold;"></span>
            </div>
            
            <div id="practice-note-container" class="hidden practice-note-container flex flex-col items-center justify-center" style="min-height: 200px;">
                <span class="current-practice-note" style="font-size: 8rem; font-weight: bold; line-height: 1;"></span>
                <div id="tuner-display" class="hidden">
                    <span style="text-transform: uppercase; font-size: 0.8rem; color: var(--text-light); margin-right: 10px;">Detected:</span>
                    <span id="detected-note" style="font-size: 1.5rem; font-weight: bold;">-</span>
                </div>
                <div style="margin-top: 20px; text-align: center;">
                     <span style="text-transform: uppercase; font-size: 0.8rem; color: var(--text-light);">Next</span>
                     <span id="next-practice-note" style="display: block; font-size: 2rem; font-weight: bold; color: var(--text-light);"></span>
                </div>
            </div>
            
            <div id="practice-tab-view" class="hidden w-full text-center" style="max-width: 600px; margin: 20px auto;"></div>

            <!-- Metronome Dots -->
            <div id="beat-dots-container" class="flex justify-center items-center gap-4" style="height: 30px; margin: 10px 0;"></div>

            <!-- Answers -->
            <div id="answer-options" class="grid grid-cols-2 gap-4 w-full" style="max-width: 600px; margin: 20px auto;"></div>
            <div id="feedback" class="text-center h-12" style="font-size: 1.5rem; font-weight: bold; margin-top: 1rem;"></div>
            
            <!-- Controls -->
            <div class="flex flex-col gap-4 items-center justify-center mt-4" style="flex-direction: row;">
                <button id="metronome-btn" class="btn-primary">Start Metronome</button>
                <button id="next-btn" class="btn-secondary">Next Note</button>
                <button id="stats-btn" class="btn-secondary">Show Stats</button>
            </div>
        </div>
    </main>

    <!-- Stats Modal -->
    <div id="stats-modal-overlay" class="hidden">
        <div id="stats-modal">
            <div class="flex justify-between items-center p-4" style="border-bottom: 1px solid var(--border-color);">
                <h2 class="text-xl font-bold">Mistake Statistics</h2>
                <button id="close-stats-btn" style="background: none; border: none; font-size: 1.5rem; cursor: pointer;">&times;</button>
            </div>
            <div id="stats-content" style="padding: 1.5rem; max-height: 300px; overflow-y: auto;"></div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // --- Data Model ---
            const notes = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
            const tuning = ['E', 'B', 'G', 'D', 'A', 'E']; // Thin to Thick
            const FRET_COUNT = 12;
            const SPIDER_FINGERS = 4;
            const scalePatterns = {
                majorScale: [2, 2, 1, 2, 2, 2, 1],
                minorScale: [2, 1, 2, 2, 1, 2, 2],
                majorPentatonic: [2, 2, 3, 2, 3],
                minorPentatonic: [3, 2, 2, 3, 2],
            };

            // --- Elements ---
            const bodyEl = document.body;
            const fretboardEl = document.getElementById('fretboard');
            const fretboardContainer = document.getElementById('fretboard-container');
            const fretNumbersEl = document.getElementById('fret-numbers');
            const answerOptionsEl = document.getElementById('answer-options');
            const feedbackEl = document.getElementById('feedback');
            const nextBtn = document.getElementById('next-btn');
            const sidePanel = document.getElementById('side-panel');
            const settingsToggleBtn = document.getElementById('settings-toggle-btn');
            const bpmSlider = document.getElementById('bpm-slider');
            const bpmDisplay = document.getElementById('bpm-display');
            const metronomeBtn = document.getElementById('metronome-btn');
            const noteDurationInput = document.getElementById('note-duration');
            const speedUpToggle = document.getElementById('speed-up-toggle');
            const speedUpControls = document.getElementById('speed-up-controls');
            const speedUpAmount = document.getElementById('speed-up-amount');
            const speedUpInterval = document.getElementById('speed-up-interval');
            const correctCountEl = document.getElementById('correct-count');
            const incorrectCountEl = document.getElementById('incorrect-count');
            const statsDisplay = document.getElementById('stats-display');
            const statsBtn = document.getElementById('stats-btn');
            const statsModalOverlay = document.getElementById('stats-modal-overlay');
            const statsContentEl = document.getElementById('stats-content');
            const closeStatsBtn = document.getElementById('close-stats-btn');
            const moduleSwitchBtns = document.querySelectorAll('.module-switch-btn');
            const practiceNoteContainer = document.getElementById('practice-note-container');
            const practiceTabView = document.getElementById('practice-tab-view');
            const nextPracticeNoteEl = document.getElementById('next-practice-note');
            const beatDotsContainer = document.getElementById('beat-dots-container');
            const naturalsOnlyToggle = document.getElementById('naturals-only-toggle');
            const noteSelectionGrid = document.getElementById('note-selection-grid');
            const viewSwitcherContainer = document.getElementById('view-switcher-container');
            const practiceModeContainer = document.getElementById('practice-mode-container');
            const techniqueModeContainer = document.getElementById('technique-mode-container');
            const techniqueSettingsContainer = document.getElementById('technique-settings-container');
            const spiderStartFretInput = document.getElementById('spider-start-fret');
            const viewSwitchBtns = document.querySelectorAll('.view-switch-btn');
            const tabContainer = document.getElementById('tab-container');
            const noteToTabQuestionContainer = document.getElementById('note-to-tab-question-container');
            const practiceSettingsContainer = document.getElementById('practice-settings-container');
            const practiceModeBtns = document.querySelectorAll('.practice-mode-btn');
            const intervalSelect = document.getElementById('interval-select');
            const scaleRootContainer = document.getElementById('scale-root-container');
            const scaleRootSelect = document.getElementById('scale-root-select');
            const micEnableToggle = document.getElementById('mic-enable-toggle');
            const tunerDisplay = document.getElementById('tuner-display');
            const detectedNoteEl = document.getElementById('detected-note');
            const darkModeToggle = document.getElementById('dark-mode-toggle');
            const leftyToggle = document.getElementById('lefty-toggle');

            // --- State ---
            let currentModule = 'guessNote';
            let currentView = 'fretboard';
            let currentPracticeMode = 'noteNames';
            let currentTechnique = 'spiderWalk';
            let correctAnswer = '';
            let isAnswered = false;
            let metronomeIntervalId = null;
            let isMetronomeOn = false;
            let isCountingIn = false;
            let countInCounter = 0;
            const COUNT_IN_BEATS = 4;
            let speedUpTickCounter = 0;
            let noteTickCounter = 0;
            let audioCtx;
            let analyser;
            let micStream;
            let pitchDetectionFrameId;
            let isPitchDetectionRunning = false;
            let correctCount = 0;
            let incorrectCount = 0;
            let noteMistakes = {};
            let currentPracticePos = null;
            let nextPracticePos = null;
            let fretboardDirection = 'up';
            let currentScale = [];
            let currentScaleIndex = 0;
            let spiderState = {};
            let lastFocusedElement;
            let wakeLock = null;

            // --- UI Helpers (Critical for Mobile Fallback) ---
            function setVisible(el, visible) {
                if (!el) return;
                if (visible) {
                    el.classList.remove('hidden');
                    el.style.display = ''; // Revert to CSS default (block/flex/grid)
                } else {
                    el.classList.add('hidden');
                    el.style.display = 'none'; // Force hide
                }
            }

            // --- Init Fretboard & Dots ---
            // IMPORTANT: highlightDot is now created on the fly or moved, NOT global floating div
            const highlightDot = document.createElement('div');
            highlightDot.id = 'highlight-dot';
            const spiderDots = [];

            function createFretboard() {
                fretboardEl.innerHTML = '';
                fretNumbersEl.innerHTML = '';
                
                // Grid columns: 5% for nut + 12 frets equal width
                const gridTemplate = `5% repeat(${FRET_COUNT}, 1fr)`; 
                fretboardEl.style.gridTemplateColumns = gridTemplate;
                fretNumbersEl.style.gridTemplateColumns = gridTemplate;
                fretboardEl.style.gridTemplateRows = `repeat(6, 1fr)`; // 6 Strings

                const stringThickness = [1, 1.5, 2, 2.5, 3, 3.5]; // Visually distinct

                for (let i = 0; i < tuning.length; i++) {
                    for (let j = 0; j <= FRET_COUNT; j++) {
                        const fretEl = document.createElement('div');
                        fretEl.className = 'fret';
                        fretEl.dataset.string = i;
                        fretEl.dataset.fret = j;
                        
                        const stringLine = document.createElement('div');
                        stringLine.className = 'string-line';
                        stringLine.style.height = `${stringThickness[i]}px`;
                        fretEl.appendChild(stringLine);
                        fretboardEl.appendChild(fretEl);
                    }
                }
                
                // Markers
                const markers = { 3: [2], 5: [2], 7: [2], 9: [2], 12: [1, 3] };
                for (const fret in markers) {
                    markers[fret].forEach(stringIndex => {
                         const targetFret = fretboardEl.querySelector(`.fret[data-string='${stringIndex}'][data-fret='${fret}']`);
                         if(targetFret) {
                            const markerDot = document.createElement('div');
                            markerDot.className = 'marker-dot';
                            targetFret.appendChild(markerDot);
                         }
                    });
                }
                
                // Fret Numbers
                const emptyFretDiv = document.createElement('div');
                fretNumbersEl.appendChild(emptyFretDiv); 
                for (let j = 1; j <= FRET_COUNT; j++) {
                    const fretNumEl = document.createElement('div');
                    fretNumEl.style.textAlign = 'center';
                    fretNumEl.style.color = 'var(--text-light)';
                    fretNumEl.style.fontSize = '0.8rem';
                    if ([3, 5, 7, 9, 12].includes(j)) fretNumEl.textContent = j;
                    fretNumbersEl.appendChild(fretNumEl);
                }
                
                // Setup spider dots (detached initially)
                for (let i = 0; i < SPIDER_FINGERS; i++) {
                    const dot = document.createElement('div');
                    dot.className = 'spider-dot';
                    dot.style.borderColor = `hsl(${i * 60}, 70%, 50%)`;
                    spiderDots.push(dot);
                }
            }

            function createTabView() {
                tabContainer.innerHTML = '';
                tuning.forEach((stringName, stringIndex) => {
                    const stringEl = document.createElement('div');
                    stringEl.className = 'tab-string';
                    stringEl.dataset.stringIndex = stringIndex;
                    stringEl.innerHTML = `
                        <span style="width: 30px; color: var(--text-light);">${stringName}</span>
                        <span>|--</span>
                        <span class="tab-fret">-</span>
                        <span>--|</span>
                    `;
                    tabContainer.appendChild(stringEl);
                });
            }

            // --- Audio & Wake Lock ---
            const requestWakeLock = async () => {
                if ('wakeLock' in navigator) {
                    try {
                        wakeLock = await navigator.wakeLock.request('screen');
                    } catch (err) { console.log(err); }
                }
            };
            const releaseWakeLock = async () => {
                if (wakeLock) {
                    try { await wakeLock.release(); wakeLock = null; } catch (err) { console.log(err); }
                }
            };

            function setupAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
            
            function playTick(isCountIn) {
                const tickCtx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = tickCtx.createOscillator();
                const gain = tickCtx.createGain();
                osc.connect(gain); gain.connect(tickCtx.destination);
                osc.type = isCountIn ? 'sine' : 'triangle';
                osc.frequency.setValueAtTime(isCountIn ? 440 : 880, tickCtx.currentTime);
                gain.gain.setValueAtTime(0.4, tickCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, tickCtx.currentTime + 0.05);
                osc.start(); osc.stop(tickCtx.currentTime + 0.05);
            }

            // --- Logic Helpers ---
            function getNote(string, fret) {
                const open = tuning[string];
                const idx = (notes.indexOf(open) + fret) % 12;
                return notes[idx];
            }

            function displayDotAt(dot, string, fret) {
                const target = fretboardEl.querySelector(`.fret[data-string='${string}'][data-fret='${fret}']`);
                if (target) {
                    // NEW METHOD: Append child directly to target fret div.
                    // CSS handles centering perfectly.
                    if (dot.parentNode !== target) {
                        target.appendChild(dot);
                    }
                    dot.style.display = 'block';
                } else {
                    dot.style.display = 'none';
                    if (dot.parentNode) dot.parentNode.removeChild(dot);
                }
            }

            // --- Game Logic ---
            function newQuestion() {
                if (currentModule === 'technique') { resetSpiderState(); return; }
                
                let activeNotes;
                if (intervalSelect.value.includes('Scale')) {
                   if (currentScale.length === 0) updateCurrentScale();
                   activeNotes = currentScale;
                } else {
                   activeNotes = naturalsOnlyToggle.checked ? notes.filter(n => !n.includes('#')) : notes;
                   // If manual selection logic were added, filter here
                }
                
                isAnswered = false;
                feedbackEl.textContent = '';
                highlightDot.style.display = 'none';

                if (currentModule === 'guessNote') {
                    if (currentView === 'fretboard' || currentView === 'tab') {
                        const targetNote = activeNotes[Math.floor(Math.random() * activeNotes.length)];
                        const occurrences = [];
                        for(let s=0; s<6; s++) for(let f=0; f<=12; f++) if(getNote(s,f) === targetNote) occurrences.push({s,f});
                        
                        if(occurrences.length === 0) return newQuestion();
                        const pos = occurrences[Math.floor(Math.random() * occurrences.length)];
                        correctAnswer = targetNote;

                        if (currentView === 'fretboard') {
                            displayDotAt(highlightDot, pos.s, pos.f);
                        } else {
                            document.querySelectorAll('.tab-fret').forEach(e => e.textContent = '-');
                            tabContainer.querySelector(`.tab-string[data-string-index='${pos.s}'] .tab-fret`).textContent = pos.f;
                        }
                        
                        // Options
                        const opts = new Set([targetNote]);
                        while(opts.size < 4) opts.add(notes[Math.floor(Math.random()*12)]);
                        answerOptionsEl.innerHTML = '';
                        Array.from(opts).sort(() => Math.random() - 0.5).forEach(n => {
                            const btn = document.createElement('button');
                            btn.textContent = n;
                            btn.onclick = () => handleAnswer(n, btn);
                            answerOptionsEl.appendChild(btn);
                        });
                    } else if (currentView === 'noteToTab') {
                        const targetNote = activeNotes[Math.floor(Math.random() * activeNotes.length)];
                        document.querySelector('#note-to-tab-question-container .current-practice-note').textContent = targetNote;
                        
                        const occurrences = [];
                        for(let s=0; s<6; s++) for(let f=1; f<=12; f++) if(getNote(s,f) === targetNote) occurrences.push({s,f});
                        if(occurrences.length === 0) return newQuestion();
                        const correct = occurrences[Math.floor(Math.random() * occurrences.length)];
                        correctAnswer = `${correct.s}-${correct.f}`;
                        
                        const opts = new Set([correctAnswer]);
                        while(opts.size < 4) {
                            const s = Math.floor(Math.random()*6);
                            const f = Math.floor(Math.random()*12)+1;
                            if(getNote(s,f) !== targetNote) opts.add(`${s}-${f}`);
                        }
                        answerOptionsEl.innerHTML = '';
                        Array.from(opts).sort(() => Math.random() - 0.5).forEach(p => {
                            const [s,f] = p.split('-');
                            const btn = document.createElement('button');
                            btn.innerHTML = `<b>${tuning[s]}</b> str - <b>${f}</b> fret`;
                            btn.onclick = () => handleAnswer(p, btn);
                            answerOptionsEl.appendChild(btn);
                        });
                    }
                } else if (currentModule === 'playPractice') {
                     // Logic simplified for robustness
                     const nextNote = activeNotes[Math.floor(Math.random() * activeNotes.length)];
                     document.querySelector('#practice-note-container .current-practice-note').textContent = nextNote;
                     drawBeatDots();
                     updateActiveDot(0);
                }
            }

            function handleAnswer(ans, btn) {
                if (isAnswered) return;
                isAnswered = true;
                const isCorrect = ans === correctAnswer;
                if (isCorrect) {
                    correctCount++;
                    btn.classList.add('correct-ans');
                    feedbackEl.textContent = "Correct!";
                    feedbackEl.style.color = "var(--success-color)";
                } else {
                    incorrectCount++;
                    btn.classList.add('wrong-ans');
                    feedbackEl.textContent = `Wrong! Answer: ${correctAnswer.replace('-', ' string - ' + ' fret')}`;
                    feedbackEl.style.color = "var(--error-color)";
                }
                updateStats();
                if (!isMetronomeOn) setTimeout(newQuestion, 1000);
            }
            
            function updateStats() {
                correctCountEl.textContent = correctCount;
                incorrectCountEl.textContent = incorrectCount;
            }

            // --- Metronome ---
            function metronomeTick() {
                if (isCountingIn) {
                    playTick(true);
                    feedbackEl.textContent = `Starting in ${COUNT_IN_BEATS - countInCounter}...`;
                    countInCounter++;
                    if (countInCounter >= COUNT_IN_BEATS) {
                        isCountingIn = false;
                        noteTickCounter = 0;
                        feedbackEl.textContent = '';
                        newQuestion();
                    }
                    return;
                }

                playTick(false);
                
                // Visuals
                if (currentModule === 'technique') {
                    spiderWalkTick();
                } else if (currentModule === 'playPractice') {
                    updateActiveDot(noteTickCounter);
                    const duration = parseInt(noteDurationInput.value) || 1;
                    noteTickCounter++;
                    if (noteTickCounter >= duration) {
                        noteTickCounter = 0;
                        newQuestion();
                    }
                } else if (currentModule === 'guessNote') {
                     const duration = parseInt(noteDurationInput.value) || 1;
                     noteTickCounter++;
                     if (noteTickCounter >= duration) {
                         noteTickCounter = 0;
                         if (!isAnswered) {
                             incorrectCount++;
                             updateStats();
                             feedbackEl.textContent = "Too slow!";
                             newQuestion();
                         }
                     }
                }
            }

            function toggleMetronome() {
                isMetronomeOn = !isMetronomeOn;
                if (isMetronomeOn) {
                    setupAudio();
                    requestWakeLock();
                    metronomeBtn.textContent = "Stop Metronome";
                    metronomeBtn.style.backgroundColor = "var(--error-color)";
                    isCountingIn = true;
                    countInCounter = 0;
                    noteTickCounter = 0;
                    metronomeIntervalId = setInterval(metronomeTick, 60000 / parseInt(bpmSlider.value));
                    metronomeTick();
                } else {
                    releaseWakeLock();
                    clearInterval(metronomeIntervalId);
                    metronomeBtn.textContent = "Start Metronome";
                    metronomeBtn.style.backgroundColor = "var(--accent-color)";
                    isCountingIn = false;
                }
            }

            function drawBeatDots() {
                beatDotsContainer.innerHTML = '';
                const count = parseInt(noteDurationInput.value) || 1;
                for(let i=0; i<Math.min(count, 16); i++) {
                    const d = document.createElement('div');
                    d.className = 'beat-dot';
                    beatDotsContainer.appendChild(d);
                }
            }
            function updateActiveDot(idx) {
                const dots = beatDotsContainer.children;
                for(let i=0; i<dots.length; i++) {
                    if(i===idx) dots[i].classList.add('active');
                    else dots[i].classList.remove('active');
                }
            }

            // --- Technique ---
            function resetSpiderState() {
                // Simple spider reset
                spiderState = { step: 0, start: parseInt(spiderStartFretInput.value)||1 };
                spiderDots.forEach(d => { d.style.display = 'none'; if(d.parentNode) d.parentNode.removeChild(d); });
            }
            function spiderWalkTick() {
                const finger = spiderState.step % 4;
                const string = 5 - Math.floor(spiderState.step / 4); // Start thick string
                const fret = spiderState.start + finger;
                
                if (string < 0) { resetSpiderState(); return; }
                
                spiderDots.forEach((d, i) => {
                    if (i === finger) displayDotAt(d, string, fret);
                    else {
                         d.style.display = 'none';
                         if(d.parentNode) d.parentNode.removeChild(d);
                    }
                });
                spiderState.step++;
            }

            // --- Module Management (Crucial Fix) ---
            function setModule(name) {
                currentModule = name;
                
                // Update buttons
                moduleSwitchBtns.forEach(b => {
                    if(b.dataset.module === name) b.classList.add('active');
                    else b.classList.remove('active');
                });

                const isGuess = name === 'guessNote';
                const isPlay = name === 'playPractice';
                const isTech = name === 'technique';

                // Force visibility with inline styles
                setVisible(viewSwitcherContainer, isGuess);
                setVisible(practiceModeContainer, isPlay);
                setVisible(techniqueModeContainer, isTech);
                setVisible(practiceSettingsContainer, isPlay);
                setVisible(techniqueSettingsContainer, isTech);
                
                // Correct logic: show fretboard for 'technique' OR 'guessNote'+fretboard_view
                const showFretboard = isTech || (isGuess && currentView === 'fretboard');
                setVisible(document.getElementById('fretboard-container'), showFretboard);
                
                setVisible(tabContainer, isGuess && currentView === 'tab');
                setVisible(noteToTabQuestionContainer, isGuess && currentView === 'noteToTab');
                setVisible(practiceNoteContainer, isPlay && currentPracticeMode === 'noteNames');
                setVisible(practiceTabView, isPlay && currentPracticeMode === 'tabSequence');
                
                setVisible(answerOptionsEl, isGuess);
                setVisible(statsDisplay, !isTech);
                setVisible(nextBtn, !isTech);
                
                if (isGuess) setView(currentView); // Refresh view specifics
                else newQuestion(); // Trigger for non-guess modes
            }
            
            function setView(view) {
                currentView = view;
                viewSwitchBtns.forEach(b => {
                    if(b.dataset.view === view) b.classList.add('active');
                    else b.classList.remove('active');
                });
                // Only re-trigger module logic if we are in guessNote mode to avoid layout thrashing
                if (currentModule === 'guessNote') setModule(currentModule);
            }

            function updateCurrentScale() {
                // Placeholder for scale logic
                currentScale = ['C', 'D', 'E', 'F', 'G', 'A', 'B']; 
            }

            // --- Listeners ---
            settingsToggleBtn.onclick = () => bodyEl.classList.toggle('panel-visible');
            bpmSlider.oninput = (e) => bpmDisplay.textContent = e.target.value + ' BPM';
            metronomeBtn.onclick = toggleMetronome;
            nextBtn.onclick = newQuestion;
            
            moduleSwitchBtns.forEach(b => b.onclick = () => setModule(b.dataset.module));
            viewSwitchBtns.forEach(b => b.onclick = () => setView(b.dataset.view));
            
            document.querySelectorAll('.practice-mode-btn').forEach(b => b.onclick = () => {
                document.querySelectorAll('.practice-mode-btn').forEach(x => x.classList.remove('active'));
                b.classList.add('active');
                currentPracticeMode = b.dataset.practiceMode;
                setModule(currentModule);
            });

            // Init
            createFretboard();
            createTabView();
            // Populate selects
            notes.forEach(n => {
                const opt = document.createElement('option');
                opt.value = n; opt.textContent = n;
                scaleRootSelect.appendChild(opt);
            });
            notes.forEach(n => {
                const d = document.createElement('div');
                d.innerHTML = `<input type="checkbox" checked> ${n}`;
                noteSelectionGrid.appendChild(d);
            });
            
            // Initial State
            setTimeout(() => setModule('guessNote'), 100);
        });
    </script>
</body>
</html>
